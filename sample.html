<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GymPOS · Payment & Change Calculator | Dynamic Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #edf2f9 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .brand h1 {
            font-weight: 800;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #0f2b2d, #1f4e3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            background: #1e2f3c;
            padding: 6px 18px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .pos-grid {
            display: grid;
            grid-template-columns: 1fr 0.98fr;
            gap: 1.8rem;
        }

        /* products panel */
        .products-panel {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .section-title {
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1rem;
        }
        .product-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
            border: 1px solid #e9eef3;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 28px -10px rgba(0, 0, 0, 0.12);
            border-color: #cbdbe0;
        }
        .product-name {
            font-weight: 700;
            font-size: 1rem;
        }
        .product-price {
            color: #1f6e43;
            font-weight: 800;
            margin: 8px 0;
        }
        .product-stock {
            font-size: 0.7rem;
            color: #5b6e82;
            margin-bottom: 8px;
        }
        .add-btn {
            background: #1e2f3c;
            border: none;
            width: 100%;
            padding: 8px 0;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-btn:hover { background: #2c4b5e; }
        .out-of-stock { opacity: 0.45; pointer-events: none; filter: grayscale(0.1); }

        /* cart & payment panel */
        .cart-panel {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 0.7rem;
        }
        .cart-items {
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafcff;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 1.2rem;
            border: 1px solid #eef2f8;
        }
        .cart-item-info { flex: 2; }
        .cart-item-name { font-weight: 600; }
        .cart-item-price { font-size: 0.7rem; color: #526477; }
        .cart-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef2f7;
            padding: 4px 10px;
            border-radius: 48px;
        }
        .cart-qty button {
            background: none;
            border: none;
            font-weight: 800;
            font-size: 1.2rem;
            width: 26px;
            cursor: pointer;
            color: #1f3b4c;
        }
        .cart-item-total { font-weight: 800; min-width: 80px; text-align: right; }
        .remove-item {
            background: none;
            border: none;
            margin-left: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #b91c1c;
            opacity: 0.6;
        }

        /* customer & payment block */
        .payment-block {
            background: #f8fafd;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 0.3rem;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .input-group {
            flex: 1;
            min-width: 130px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c3e50;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 16px;
            border: 1px solid #cfdfed;
            background: white;
            font-size: 0.85rem;
        }
        .payment-method {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }
        .total-area {
            background: #eaf2f9;
            padding: 12px 15px;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grand-total {
            font-size: 1.7rem;
            font-weight: 800;
            color: #1b4d2e;
        }
        .change-area {
            background: #e0f0ea;
            padding: 10px 15px;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }
        .change-value {
            font-size: 1.5rem;
            color: #1a5d3b;
        }
        .checkout-btn {
            background: #0f2c21;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        .checkout-btn:hover { background: #1e4a38; transform: scale(0.98); }
        .invoice-preview {
            margin-top: 16px;
            background: #fef8e7;
            border-radius: 1.4rem;
            padding: 1rem;
            font-size: 0.75rem;
            border-left: 5px solid #e2b13b;
        }
        hr { margin: 8px 0; }
        @media (max-width: 900px) { .pos-grid { grid-template-columns: 1fr; } body { padding: 1rem; } }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="brand">
        <h1>💪 GYM POS • CASH & CHANGE</h1>
        <div class="badge">💰 CUSTOMER PAYMENT + CHANGE CALCULATION (JS ONLY)</div>
    </div>

    <div class="pos-grid">
        <!-- PRODUCTS SECTION -->
        <div class="products-panel">
            <div class="section-title"><span>🏋️ PRODUCTS</span><span style="font-size:0.7rem;">click to add</span></div>
            <div id="productsContainer" class="products-grid"></div>
        </div>

        <!-- CART + PAYMENT + CHANGE -->
        <div class="cart-panel">
            <div class="cart-header">
                <span style="font-weight:700;">🛒 CART</span>
                <span id="itemCount">0 items</span>
            </div>
            <div id="cartList" class="cart-items"><div style="text-align:center; color:#7f8c8d;">No items added</div></div>

            <!-- CUSTOMER INFO & PAYMENT SECTION -->
            <div class="payment-block">
                <div style="font-weight:700;">👤 CUSTOMER & PAYMENT</div>
                <div class="flex-row">
                    <div class="input-group"><label>Member ID (optional)</label><input type="text" id="memberId" placeholder="User ID if member"></div>
                    <div class="input-group"><label>Guest name</label><input type="text" id="guestName" placeholder="Walk-in name"></div>
                </div>
                <div class="payment-method">
                    <label><input type="radio" name="payMethod" value="cash" checked> 💵 Cash</label>
                    <label><input type="radio" name="payMethod" value="gcash"> 📱 GCash</label>
                </div>
                <div id="gcashField" style="display:none;"><input type="text" id="gcashRef" placeholder="GCash transaction ID / reference"></div>
                
                <!-- AMOUNT PAID & CHANGE (CASH only dynamic) -->
                <div id="cashPaymentSection" style="margin-top: 12px;">
                    <div class="flex-row">
                        <div class="input-group"><label>💰 Amount Tendered (₱)</label><input type="number" id="amountPaid" step="0.01" min="0" placeholder="0.00"></div>
                    </div>
                </div>
            </div>

            <!-- totals & change display -->
            <div class="total-area">
                <span style="font-weight:700;">TOTAL DUE</span>
                <span class="grand-total" id="cartTotal">0.00</span>
            </div>
            <div id="changeDisplay" class="change-area" style="display: none;">
                <span>💸 CHANGE (Cash)</span>
                <span class="change-value" id="changeAmount">0.00</span>
            </div>

            <button class="checkout-btn" id="checkoutBtn">✔️ PAY & COMPLETE TRANSACTION</button>

            <!-- INVOICE PREVIEW (will show payment & change details) -->
            <div class="invoice-preview" id="invoicePreview">
                <strong>🧾 INVOICE SUMMARY</strong><br>
                <span style="font-size:0.7rem;">Transaction + change will appear here</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- INVENTORY (demo products) ----------
    let products = [
        { id: 1, name: "⚡ Sting Energy", price: 45.00, quantity: 12, sold: 3 },
        { id: 2, name: "🥛 Whey Protein", price: 2200.00, quantity: 8, sold: 2 },
        { id: 3, name: "👕 Gym T-shirt", price: 390.00, quantity: 15, sold: 5 },
        { id: 4, name: "🏆 1 Month Membership", price: 550.00, quantity: 999, sold: 27 },
        { id: 5, name: "🧤 Lifting Straps", price: 180.00, quantity: 9, sold: 3 },
        { id: 6, name: "🍫 Protein Bar", price: 95.00, quantity: 20, sold: 8 }
    ];

    let cart = [];  // { productId, name, unitPrice, quantity }

    // Helper: update stock after transaction
    function applyStockReduction() {
        for (let item of cart) {
            const prod = products.find(p => p.id === item.productId);
            if (prod) {
                prod.quantity -= item.quantity;
                prod.sold += item.quantity;
            }
        }
        renderProducts();
    }

    // render product grid
    function renderProducts() {
        const container = document.getElementById('productsContainer');
        if (!container) return;
        container.innerHTML = '';
        products.forEach(prod => {
            const isOut = prod.quantity <= 0;
            const card = document.createElement('div');
            card.className = `product-card ${isOut ? 'out-of-stock' : ''}`;
            card.innerHTML = `
                <div class="product-name">${prod.name}</div>
                <div class="product-price">₱ ${prod.price.toFixed(2)}</div>
                <div class="product-stock">📦 stock: ${prod.quantity} | sold: ${prod.sold}</div>
                <button class="add-btn" data-id="${prod.id}" ${isOut ? 'disabled' : ''}>➕ ADD</button>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                addToCart(id);
            });
        });
    }

    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product || product.quantity <= 0) {
            alert("❌ Out of stock");
            return;
        }
        const existing = cart.find(i => i.productId === productId);
        if (existing) {
            if (existing.quantity + 1 > product.quantity) {
                alert(`⚠️ Only ${product.quantity} left.`);
                return;
            }
            existing.quantity += 1;
        } else {
            cart.push({
                productId: product.id,
                name: product.name,
                unitPrice: product.price,
                quantity: 1
            });
        }
        renderCart();
        updateDueAndChange();  // refresh total display & change
    }

    function updateCartQty(productId, delta) {
        const idx = cart.findIndex(i => i.productId === productId);
        if (idx === -1) return;
        const item = cart[idx];
        const productStock = products.find(p => p.id === productId)?.quantity || 0;
        const newQty = item.quantity + delta;
        if (newQty <= 0) {
            cart.splice(idx, 1);
        } else if (newQty > productStock + (delta === 1 ? 0 : item.quantity)) {
            alert(`❌ Not enough stock`);
            return;
        } else {
            item.quantity = newQty;
        }
        renderCart();
        updateDueAndChange();
    }

    function removeItem(productId) {
        cart = cart.filter(i => i.productId !== productId);
        renderCart();
        updateDueAndChange();
    }

    function renderCart() {
        const cartContainer = document.getElementById('cartList');
        const totalSpan = document.getElementById('cartTotal');
        const itemCountSpan = document.getElementById('itemCount');
        if (!cartContainer) return;

        if (cart.length === 0) {
            cartContainer.innerHTML = `<div style="text-align:center; color:#7f8c8d; padding:20px;">✨ Cart empty — add products</div>`;
            if (totalSpan) totalSpan.innerText = '0.00';
            if (itemCountSpan) itemCountSpan.innerText = '0 items';
            return;
        }

        let total = 0;
        let totalQty = 0;
        cartContainer.innerHTML = '';
        cart.forEach(item => {
            const lineTotal = item.unitPrice * item.quantity;
            total += lineTotal;
            totalQty += item.quantity;
            const row = document.createElement('div');
            row.className = 'cart-item';
            row.innerHTML = `
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">₱ ${item.unitPrice.toFixed(2)} ea</div>
                </div>
                <div class="cart-qty">
                    <button data-id="${item.productId}" data-delta="-1">−</button>
                    <span>${item.quantity}</span>
                    <button data-id="${item.productId}" data-delta="1">+</button>
                </div>
                <div class="cart-item-total">₱ ${lineTotal.toFixed(2)}</div>
                <button class="remove-item" data-id="${item.productId}">🗑️</button>
            `;
            cartContainer.appendChild(row);
        });
        if (totalSpan) totalSpan.innerText = total.toFixed(2);
        if (itemCountSpan) itemCountSpan.innerText = totalQty + ' item(s)';

        // attach dynamic listeners
        document.querySelectorAll('.cart-qty button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const delta = parseInt(btn.getAttribute('data-delta'));
                updateCartQty(id, delta);
            });
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                removeItem(id);
            });
        });
    }

    // ---------- CUSTOMER PAYMENT & CHANGE LOGIC (pure JS) ----------
    function getTotalDue() {
        return cart.reduce((sum, item) => sum + (item.unitPrice * item.quantity), 0);
    }

    function updateDueAndChange() {
        const totalDue = getTotalDue();
        const cartTotalSpan = document.getElementById('cartTotal');
        if (cartTotalSpan) cartTotalSpan.innerText = totalDue.toFixed(2);
        
        // detect payment method and cash amount
        const payMethod = document.querySelector('input[name="payMethod"]:checked')?.value || 'cash';
        const cashGiven = parseFloat(document.getElementById('amountPaid')?.value || '0');
        const changeSpan = document.getElementById('changeAmount');
        const changeContainer = document.getElementById('changeDisplay');
        
        if (payMethod === 'cash' && !isNaN(cashGiven) && cashGiven >= totalDue && totalDue > 0) {
            const change = cashGiven - totalDue;
            if (changeSpan) changeSpan.innerText = change.toFixed(2);
            if (changeContainer) changeContainer.style.display = 'flex';
        } else if (payMethod === 'cash' && cashGiven < totalDue && totalDue > 0) {
            if (changeSpan) changeSpan.innerText = '0.00';
            if (changeContainer) changeContainer.style.display = 'flex';
        } else {
            if (changeContainer) changeContainer.style.display = 'none';
        }
        // if cart empty, hide change display
        if (totalDue === 0) {
            if (changeContainer) changeContainer.style.display = 'none';
        }
    }

    // event listeners for amount input + payment method toggles
    function bindPaymentEvents() {
        const amountInput = document.getElementById('amountPaid');
        if (amountInput) {
            amountInput.addEventListener('input', () => updateDueAndChange());
        }
        const radioButtons = document.querySelectorAll('input[name="payMethod"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', () => {
                const gcashDiv = document.getElementById('gcashField');
                const cashSection = document.getElementById('cashPaymentSection');
                if (radio.value === 'gcash') {
                    if (gcashDiv) gcashDiv.style.display = 'block';
                    if (cashSection) cashSection.style.display = 'none';
                } else {
                    if (gcashDiv) gcashDiv.style.display = 'none';
                    if (cashSection) cashSection.style.display = 'block';
                }
                updateDueAndChange();
                // reset change display
                const changeContainer = document.getElementById('changeDisplay');
                if (changeContainer) changeContainer.style.display = 'none';
                if (cashSection && radio.value === 'cash') {
                    // re-trigger calculation
                    updateDueAndChange();
                }
            });
        });
        // trigger initial visibility
        const activeMethod = document.querySelector('input[name="payMethod"]:checked')?.value;
        if (activeMethod === 'gcash') {
            const gcashDiv = document.getElementById('gcashField');
            if (gcashDiv) gcashDiv.style.display = 'block';
            const cashSec = document.getElementById('cashPaymentSection');
            if (cashSec) cashSec.style.display = 'none';
        } else {
            const gcashDiv = document.getElementById('gcashField');
            if (gcashDiv) gcashDiv.style.display = 'none';
            const cashSec = document.getElementById('cashPaymentSection');
            if (cashSec) cashSec.style.display = 'block';
        }
    }

    // generate OR number
    function generateOrNumber() {
        return "OR-" + new Date().getFullYear() + String(Math.floor(Math.random() * 9000) + 1000) + "-" + Date.now().toString().slice(-6);
    }

    // process transaction (with change & payment validation)
    function processTransaction() {
        if (cart.length === 0) {
            alert("❌ Cart is empty. Add items first.");
            return;
        }
        const totalDue = getTotalDue();
        const paymentMethod = document.querySelector('input[name="payMethod"]:checked')?.value;
        let amountTendered = 0;
        let gcashRef = null;
        let change = 0;
        
        if (paymentMethod === 'cash') {
            amountTendered = parseFloat(document.getElementById('amountPaid')?.value || '0');
            if (isNaN(amountTendered) || amountTendered < totalDue) {
                alert(`⚠️ Insufficient cash: Amount tendered (₱${amountTendered.toFixed(2)}) < Total due (₱${totalDue.toFixed(2)})`);
                return;
            }
            change = amountTendered - totalDue;
        } else { // gcash
            gcashRef = document.getElementById('gcashRef')?.value.trim();
            if (!gcashRef) {
                alert("❌ GCash transaction ID is required.");
                return;
            }
            amountTendered = totalDue; // full amount assumed
            change = 0;
        }
        
        // get customer info
        const memberId = document.getElementById('memberId')?.value.trim() || null;
        const guestName = document.getElementById('guestName')?.value.trim() || null;
        if (!memberId && !guestName) {
            alert("Please provide Member ID OR Guest name.");
            return;
        }
        
        const orNumber = generateOrNumber();
        const transactionItems = cart.map(item => ({
            product: item.name,
            quantity: item.quantity,
            unit_price: item.unitPrice,
            total: item.unitPrice * item.quantity
        }));
        
        // apply stock reduction (simulate DB)
        applyStockReduction();
        
        // build invoice HTML (show change & payment details)
        const nowDate = new Date().toLocaleString();
        let invoiceHtml = `<strong>🧾 INVOICE #${orNumber}</strong><br>`;
        invoiceHtml += `<span>📅 ${nowDate} | Payment: ${paymentMethod.toUpperCase()}</span><hr>`;
        invoiceHtml += `<table style="width:100%; font-size:0.7rem; border-collapse:collapse;"><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Total</th></tr>`;
        transactionItems.forEach(it => {
            invoiceHtml += `<tr><td>${it.product}</td><td>${it.quantity}</td><td>₱${it.unit_price.toFixed(2)}</td><td>₱${it.total.toFixed(2)}</td></tr>`;
        });
        invoiceHtml += `<tr><td colspan="3" style="text-align:right"><strong>TOTAL DUE</strong></td><td><strong>₱${totalDue.toFixed(2)}</strong></td></tr>`;
        if (paymentMethod === 'cash') {
            invoiceHtml += `<tr><td colspan="3" style="text-align:right">Cash Tendered</td><td>₱${amountTendered.toFixed(2)}</td></tr>`;
            invoiceHtml += `<tr><td colspan="3" style="text-align:right; color:#1f6e43;">💰 CHANGE</td><td style="color:#1f6e43;">₱${change.toFixed(2)}</td></tr>`;
        } else {
            invoiceHtml += `<tr><td colspan="3" style="text-align:right">GCash Ref</td><td>${gcashRef}</td></tr>`;
            invoiceHtml += `<tr><td colspan="3" style="text-align:right">Amount Paid</td><td>₱${amountTendered.toFixed(2)}</td></tr>`;
        }
        invoiceHtml += `</table><hr><div>👤 ${memberId ? `Member ID: ${memberId}` : `Guest: ${guestName}`}</div>`;
        invoiceHtml += `<div>✅ Transaction complete | Stock updated | Change computed</div>`;
        
        document.getElementById('invoicePreview').innerHTML = invoiceHtml;
        
        // clear cart and reset payment fields
        cart = [];
        renderCart();
        updateDueAndChange();
        // reset payment fields
        document.getElementById('amountPaid').value = '';
        document.getElementById('gcashRef').value = '';
        document.getElementById('memberId').value = '';
        document.getElementById('guestName').value = '';
        const changeContainer = document.getElementById('changeDisplay');
        if (changeContainer) changeContainer.style.display = 'none';
        // reset radio to cash default
        const cashRadio = document.querySelector('input[value="cash"]');
        if (cashRadio) cashRadio.checked = true;
        bindPaymentEvents(); // rebind visibility
        updateDueAndChange();
        
        alert(`✅ Sale complete! ${paymentMethod === 'cash' ? `Change: ₱${change.toFixed(2)}` : `GCash ref: ${gcashRef}`}\nOR: ${orNumber}`);
    }
    
    // initialization
    document.addEventListener('DOMContentLoaded', () => {
        renderProducts();
        renderCart();
        bindPaymentEvents();
        updateDueAndChange();
        document.getElementById('checkoutBtn')?.addEventListener('click', processTransaction);
    });
</script>
</body>
</html>
